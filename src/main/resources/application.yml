server:
  port: 8090

spring:
  application:
    name: look-graph
  threads:
    virtual:
      enabled: true
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: ${NEO4J_PASSWORD:Zyc163000!@#}
    pool:
      max-connection-pool-size: 50
      connection-acquisition-timeout: 60s
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:lookgraph}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

lookgraph:
  chroma:
    url: ${CHROMA_URL:http://[::1]:8000}
  embedding:
    api-key: ${EMBEDDING_API_KEY:ollama}
    base-url: ${EMBEDDING_BASE_URL:http://localhost:11434}
    model: nomic-embed-text
  python:
    bin: python3
  scanner:
    excludes:
      - "**/target/**"
      - "**/build/**"
      - "**/node_modules/**"
      - "**/.git/**"
      - "**/.idea/**"

logging:
  level:
    com.lookgraph: INFO
    org.springframework.data.neo4j: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  security:
    enabled: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
